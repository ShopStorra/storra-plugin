name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# softprops/action-gh-release needs write access to create the
# Release on tag push. Workflow-level GITHUB_TOKEN defaults to
# read-only since it's not org policy here.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Build + test + shadowJar
        run: ./gradlew --no-daemon build

      - name: Upload JAR artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: storra-plugin
          path: build/libs/storra-plugin-*.jar
          if-no-files-found: error

      - name: Publish GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Tag like v0.1.0 → release named "Storra plugin v0.1.0"
          name: "Storra plugin ${{ github.ref_name }}"
          files: build/libs/storra-plugin-*.jar
          generate_release_notes: true
