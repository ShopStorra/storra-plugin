# Storra plugin configuration.
#
# After installing the plugin, run `/storra pair <code>` from the
# server console to populate the api section automatically. If your
# host doesn't allow interactive commands, paste the (server_id,
# secret) pair from the Storra dashboard's pairing modal directly
# into the api block below and restart.

api:
  # Public Storra API root. The default is correct for production
  # tenants. Override only if you're running against a private
  # deployment.
  base-url: "https://storra.xyz"

  # Filled in by `/storra pair <code>` (or paste manually if
  # scripted). Both values come from the dashboard's one-time
  # reveal modal.
  server-id: ""
  secret: ""

# Polling cadence. Defaults are tuned for typical merchant load
# (sub-second latency on player join, modest server-side request
# volume). Lower poll-interval for faster delivery; higher for
# quieter servers.
polling:
  poll-interval-seconds: 30
  heartbeat-interval-seconds: 60
  command-execute-parallelism: 4

# Local persistence (offline queue + delivery history).
persistence:
  database-file: "storra.db"
  history-retention: 100

# Delivery receipt — the moment a buyer's purchase actually lands.
#
# OFF by default. Flip enabled: true to opt in. When on, every
# successful delivery to an online player fires the configured
# chat message + sound + particle burst + optional title.
#
# Turn any individual channel off by clearing its value (set to "");
# everything else stays active.
#
# Template variables in any string:
#   {package}  — the package name (e.g. "VIP Rank")
#   {player}   — the player's name
receipt:
  enabled: false

  # Chat message. Empty string skips the message. Bukkit & color
  # codes work (&6 gold, &e yellow, &b aqua, &l bold, &o italic).
  chat: "&6&l✦ &eThanks for purchasing &b&l{package}&e! &6&l✦"

  # Title bar (the big text in the middle of the screen). Defaults
  # to title=empty so only the subtitle shows — quieter UX.
  title: ""
  subtitle: "&7{package} delivered"

  # Bukkit Sound enum name — see https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Sound.html
  # Common picks: ENTITY_PLAYER_LEVELUP, ENTITY_EXPERIENCE_ORB_PICKUP,
  # UI_TOAST_CHALLENGE_COMPLETE, BLOCK_NOTE_BLOCK_BELL.
  # Set to "" to disable.
  sound: "ENTITY_PLAYER_LEVELUP"

  # Bukkit Particle enum name — see https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Particle.html
  # Common picks: TOTEM_OF_UNDYING, HEART, FIREWORK, HAPPY_VILLAGER,
  # WAX_ON. Set to "" or particle-count: 0 to disable.
  particle: "TOTEM_OF_UNDYING"
  particle-count: 50

debug:
  enabled: false
